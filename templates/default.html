<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <table style="width:100%;max-width:600px;margin:0 auto;border-collapse:collapse">
    <tr>
      <td style="background:linear-gradient(135deg,#333,#000);padding:30px;text-align:center">
        <h1 style="color:#fff;margin:0;font-size:22px">{{client_name}}</h1>
      </td>
    </tr>
    <tr>
      <td style="background:#fff;padding:30px;border:1px solid #ddd">
        <h2 style="color:#333;font-size:16px;margin:0 0 20px;border-bottom:2px solid #e67e22;padding-bottom:10px">
          Información del contacto
        </h2>
        <table style="width:100%;border-collapse:collapse">
          <tr><td style="padding:8px 12px;color:#666;font-size:12px;text-transform:uppercase;border-bottom:1px solid #eee">Nombre</td><td style="padding:8px 12px;border-bottom:1px solid #eee">{{from_name}}</td></tr>
          <tr><td style="padding:8px 12px;color:#666;font-size:12px;text-transform:uppercase;border-bottom:1px solid #eee">Email</td><td style="padding:8px 12px;border-bottom:1px solid #eee">{{from_email}}</td></tr>
          <tr><td style="padding:8px 12px;color:#666;font-size:12px;text-transform:uppercase;border-bottom:1px solid #eee">Teléfono</td><td style="padding:8px 12px;border-bottom:1px solid #eee">{{phone}}</td></tr>
          <tr><td style="padding:8px 12px;color:#666;font-size:12px;text-transform:uppercase;border-bottom:1px solid #eee">Asunto</td><td style="padding:8px 12px;border-bottom:1px solid #eee">{{subject}}</td></tr>
        </table>
        <h3 style="color:#333;font-size:14px;margin:20px 0 10px;border-bottom:2px solid #e67e22;padding-bottom:10px">Mensaje</h3>
        <div style="background:#f8f9fa;padding:15px;border:1px solid #ddd;font-size:14px;line-height:1.6;white-space:pre-wrap">{{message}}</div>
      </td>
    </tr>
    <tr>
      <td style="background:#000;padding:15px;text-align:center;border-top:3px solid #e67e22">
        <p style="color:#999;font-size:11px;margin:0">
          <a href="{{site_url}}" style="color:#e67e22;text-decoration:none">{{client_name}}</a>
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
